name: Build + Extract dylib

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install make dpkg perl

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          which make || echo "make missing"
          which dpkg-deb || echo "dpkg-deb missing"

      - name: Build package
        run: |
          export THEOS=$HOME/theos
          make package || true

      - name: Prepare output
        run: |
          mkdir -p output/deb
          mkdir -p output/dylib

      - name: Collect deb
        run: |
          find . -name "*.deb" -exec cp {} output/deb/ \; || true

      - name: Extract dylib
        run: |
          brew install dpkg

          for deb in output/deb/*.deb; do
            mkdir -p tmp
            dpkg-deb -x "$deb" tmp

            find tmp -name "*.dylib" -exec cp {} output/dylib/ \; || true
            rm -rf tmp
          done

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: dylib-output
          path: output/dylib

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-output
          path: output/deb
