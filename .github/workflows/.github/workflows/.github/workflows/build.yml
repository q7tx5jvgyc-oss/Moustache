name: Build Moustache (Theos)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install make perl clang

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      - name: Build tweak
        run: |
          export THEOS=$HOME/theos
          export PATH=$THEOS/bin:$PATH
          make package || true

      - name: Collect output
        run: |
          mkdir -p output
          find . -name "*.deb" -exec cp {} output/ \; || true
          find . -name "*.dylib" -exec cp {} output/ \; || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Moustache-build
          path: output/
