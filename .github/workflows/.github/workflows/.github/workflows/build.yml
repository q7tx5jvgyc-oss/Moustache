name: Build Dylib

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build dylib
        run: |
          xcodebuild \
            -scheme YourScheme \
            -configuration Release \
            -sdk macosx \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            SKIP_INSTALL=NO \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR=build

      - name: Collect dylib
        run: |
          mkdir -p output
          find build -name "*.dylib" -exec cp {} output/ \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dylib-build
          path: output/
