name: Swift Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build project (if Swift Package)
        run: swift build

      - name: Run tests (if available)
        run: swift test || echo "No tests found"
