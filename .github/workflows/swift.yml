name: Build Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install dependencies (if needed)
        run: |
          echo "No dependencies step (add pods or brew if needed)"

      - name: Build project as Dynamic Library
        run: |
          xcodebuild \
            -scheme YourScheme \
            -configuration Release \
            -sdk iphoneos \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            SKIP_INSTALL=NO \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR=build

      - name: Collect dylib
        run: |
          mkdir -p output
          find build -type f -name "*.dylib" -exec cp {} output/ \;

      - name: Show output files
        run: ls -R output

      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: dylib-build
          path: output/
