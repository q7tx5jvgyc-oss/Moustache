name: Swift Dylib Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build dylib (Release)
        run: |
          xcodebuild \
            -scheme YourScheme \
            -configuration Release \
            -sdk iphoneos \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            SKIP_INSTALL=NO \
            BUILD_DIR=build

      - name: Collect dylib
        run: |
          mkdir -p output
          find build -name "*.dylib" -exec cp {} output/ \;

      - name: Verify output
        run: ls -R output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: moustache-dylib
          path: output/
